<!doctype html><html lang="vi"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Admin CRM V21.2 - Clean UI Fix</title>
<style>
*{box-sizing:border-box}body{margin:0;font-family:Arial,sans-serif;background:#f2fbfa;color:#0f172a}.header{height:78px;background:#fff;border-bottom:1px solid #dbe5e7;display:flex;align-items:center;justify-content:space-between;padding:0 7%;position:sticky;top:0;z-index:50}.logo{width:42px;height:42px;border-radius:14px;background:#0f766e;color:#fff;display:inline-flex;align-items:center;justify-content:center;font-weight:900}.brand{display:flex;gap:12px;align-items:center;font-weight:900;font-size:24px}.brand small{display:block;font-size:12px;color:#64748b}.nav a,.nav button{margin-left:12px;color:#0f172a;font-weight:800;background:#e7f7f5;border:0;border-radius:12px;padding:10px 14px;text-decoration:none;cursor:pointer}.container{max-width:1380px;margin:auto;padding:28px 24px}.badge{display:inline-block;background:#d7faea;color:#047857;border:1px solid #8df0bd;border-radius:999px;padding:8px 14px;font-weight:900}h1{font-size:38px;margin:12px 0}.muted,.small{color:#64748b}.card{background:#fff;border:1px solid #dbe5e7;border-radius:22px;padding:20px;box-shadow:0 10px 30px rgba(15,23,42,.05)}.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(145px,1fr));gap:14px;margin:18px 0}.kpi{background:#fff;border:1px solid #dbe5e7;border-radius:18px;padding:16px;text-align:center}.kpi strong{font-size:28px;color:#0f766e;display:block}.toolbar{display:grid;grid-template-columns:2fr 1fr 1fr auto auto;gap:10px;margin:16px 0;align-items:center}input,select,textarea{padding:11px;border:1px solid #dbe5e7;border-radius:12px;font-family:inherit}button,.btn{background:#0f766e;color:white;border:0;border-radius:12px;padding:11px 15px;font-weight:900;cursor:pointer;text-decoration:none;display:inline-block}.secondary{background:#e7f7f5!important;color:#0f766e!important}.table-wrap{overflow:auto;background:#fff;border-radius:22px;border:1px solid #dbe5e7}table{width:100%;border-collapse:separate;border-spacing:0;table-layout:fixed}th,td{padding:14px;border-bottom:1px solid #eef2f7;vertical-align:top;text-align:left;overflow:hidden}th{background:#f8fafc;font-size:14px;color:#334155}.col-customer{width:16%}.col-ai{width:12%}.col-suggest{width:22%}.col-todo{width:18%}.col-note{width:24%}.col-call{width:8%}.name{font-weight:900;font-size:16px}.phone{font-weight:900;color:#0f766e}.date{font-size:12px;color:#64748b}.ai-pill{display:inline-block;border-radius:999px;padding:7px 10px;font-weight:900}.grade-a{background:#fee2e2;color:#b91c1c}.grade-b{background:#fef3c7;color:#92400e}.grade-c{background:#dbeafe;color:#1d4ed8}.hot{border-left:6px solid #dc2626}.warm{border-left:6px solid #f59e0b}.cold{border-left:6px solid #2563eb}.todo{font-weight:900}.need{margin-top:6px;font-size:13px;color:#64748b;line-height:1.35;max-height:38px;overflow:hidden}.product{font-weight:900}.modal-bg{display:none;position:fixed;inset:0;background:rgba(15,23,42,.45);z-index:9999;align-items:center;justify-content:center;padding:18px}.modal{background:#fff;border-radius:22px;max-width:760px;width:100%;padding:22px}.timeline-item{padding:12px;border-left:4px solid #0f766e;background:#f8fafc;margin:10px 0;border-radius:12px}.login{min-height:calc(100vh - 78px);display:flex;align-items:center;justify-content:center}.login .card{max-width:460px;width:100%}td textarea{width:100%;min-height:74px;resize:vertical}.note-box{min-width:210px}.call-btn{white-space:nowrap}.legend{display:flex;gap:8px;flex-wrap:wrap;margin:8px 0}.legend span{border-radius:999px;padding:6px 10px;font-weight:900;font-size:12px}
@media(max-width:900px){.toolbar{grid-template-columns:1fr}.header{padding:0 14px}h1{font-size:30px}table{table-layout:auto}.col-customer,.col-ai,.col-suggest,.col-todo,.col-note,.col-call{width:auto}}
</style><link rel="stylesheet" href="assets/crm-clean-v21-4-4.css"><link rel="stylesheet" href="assets/no-floating-v21-4-7.css"><link rel="stylesheet" href="assets/crm-income-v21-5-5.css"><link rel="stylesheet" href="assets/crm-source-v21-6.css"></head><body><div id="root"></div><div id="modalBg" class="modal-bg"><div class="modal"><h2>Timeline lead</h2><div id="modalContent"></div><p><button onclick="closeTimeline()">Đóng</button></p></div></div><script src="assets/config.js"></script><script src="assets/v21-realtime-ai-crm.js"></script><script>
(function(){
const CFG=window.VAYNHANH247_CONFIG||{}, GAS_URL=CFG.GAS_URL, USER=CFG.ADMIN_USER, PASS=CFG.ADMIN_PASS, CALL=CFG.CALL_PHONE;
let LEADS=[]; const root=document.getElementById('root');
const esc=s=>String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
const money=n=>(Number(n)||0).toLocaleString('vi-VN')+' đ';
function shortDate(v){const d=new Date(v);return isNaN(d)?esc(v||''):d.toLocaleString('vi-VN',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'})}
function header(){return `<header class="header"><div class="brand"><span class="logo">V</span><span>VayNhanh247<small>VayNhanh247</small></span></div><div class="nav"><a href="index.html">Trang khách</a><a href="posts/index.html">Blog</a><button onclick="logout()">Đăng xuất</button></div></header>`}
function login(){root.innerHTML=header()+`<main class="container login"><div class="card"><span class="badge">Admin V21.2</span><h1>Đăng nhập CRM</h1><p class="muted">Giao diện gọn cho 1 người vận hành.</p><input id="u" placeholder="Tài khoản" style="width:100%;margin:8px 0"><input id="p" type="password" placeholder="Mật khẩu" style="width:100%;margin:8px 0"><button type="button" onclick="doLogin()">Đăng nhập</button></div></main>`}
window.doLogin=function(){if(document.getElementById('u').value===USER&&document.getElementById('p').value===PASS){sessionStorage.setItem('v21_login','1');load()}else alert('Sai tài khoản/mật khẩu')};window.logout=function(){sessionStorage.removeItem('v21_login');login()};
async function api(action,payload={}){const r=await fetch(GAS_URL,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify({action,...payload})});return await r.json()}
async function load(){root.innerHTML=header()+`<main class="container"><h1>Đang tải CRM V21.2...</h1></main>`;try{const res=await api('list');if(!res.ok)throw new Error(res.error||'Lỗi Apps Script');LEADS=(res.data||[]).map(normalizeLead);render()}catch(e){root.innerHTML=header()+`<main class="container"><div class="card"><h2>Không tải được CRM</h2><p style="color:#dc2626;font-weight:900">${esc(e.message)}</p><button onclick="load()">Thử lại</button></div></main>`}}
function normalizeLead(l){
  const ai = computeFallbackAI(l);
  if(!l.aiGrade || String(l.aiGrade).includes('http') || String(l.aiGrade).includes('Mới -')) l.aiGrade = ai.grade;
  if(!l.aiScore || isNaN(Number(l.aiScore))) l.aiScore = ai.score;
  if(!l.aiTag || String(l.aiTag).includes('http') || String(l.aiTag).includes('Mới -')) l.aiTag = ai.tag;
  if(!l.productSuggest || isNumericLike(l.productSuggest) || String(l.productSuggest).includes('http')) l.productSuggest = suggestProduct(l);
  if(!l.nextCall || String(l.nextCall).includes('http')) l.nextCall = followup(l.aiGrade).next;
  if(!l.followupDay || String(l.followupDay).includes('http')) l.followupDay = followup(l.aiGrade).day;
  return l;
}
function isNumericLike(v){return /^\s*\d+(\.\d+)?\s*$/.test(String(v||''))}
function computeFallbackAI(l){
  let text=[l.need,l.service,l.income,l.note,l.utm_source,l.url].join(' ').toLowerCase();
  let score=35; const income=Number(String(l.income||'').replace(/\D/g,''))||0;
  if(income>=20000000)score+=25; else if(income>=10000000)score+=18; else if(income>=5000000)score+=10;
  if(/gấp|hôm nay|cần vay|muốn vay|giải ngân|làm hồ sơ/.test(text))score+=25;
  if(/cic|nợ xấu|nhóm 2|nhóm 3/.test(text))score+=12;
  if(String(l.phone||'').replace(/\D/g,'').length>=9)score+=10;
  score=Math.max(0,Math.min(100,score));
  const grade=score>=75?'A':score>=50?'B':'C';
  return {grade, score, tag: grade==='A'?'🔥 Nóng':grade==='B'?'🌤 Ấm':'❄ Lạnh'};
}
function suggestProduct(l){
  const t=[l.need,l.service,l.product,l.note].join(' ').toLowerCase();
  if(/cic|nợ xấu|no xau|nhóm/.test(t))return 'Tư vấn CIC / nợ xấu';
  if(/thẻ|the tin dung|tín dụng|hạn mức/.test(t))return 'Tư vấn thẻ tín dụng';
  if(/bảo hiểm|bao hiem|bhnt|nhân thọ|sức khỏe/.test(t))return 'Tư vấn bảo hiểm';
  return 'Tư vấn vay tín chấp';
}
function followup(grade){
  if(grade==='A')return {next:'Gọi ngay trong 1 giờ',day:'D1'};
  if(grade==='B')return {next:'Gọi trong 24 giờ',day:'D3'};
  return {next:'Nuôi bằng SEO/FAQ',day:'D7'};
}
function calc(){let today=new Date().toISOString().slice(0,10),td=0,A=0,B=0,C=0,hot=0,rev=0;LEADS.forEach(l=>{if(String(l.createdAt||'').slice(0,10)===today)td++; if(l.aiGrade==='A')A++; if(l.aiGrade==='B')B++; if(l.aiGrade==='C')C++; if(String(l.aiTag||'').includes('Nóng'))hot++; rev+=Number(l.realRevenue||l.expectedCommission||0)});return {td,A,B,C,hot,rev,total:LEADS.length}}
function rowClass(l){return l.aiGrade==='A'?'hot':l.aiGrade==='B'?'warm':'cold'}
function gradeClass(l){return l.aiGrade==='A'?'grade-a':l.aiGrade==='B'?'grade-b':'grade-c'}
function compactTag(l){return esc(l.aiTag||'Chưa chấm').replace('🔥 ','').replace('🌤 ','').replace('❄ ','')}
function render(){const c=calc();root.innerHTML=header()+`<main class="container"><span class="badge">V21.2 Clean UI Fix</span><h1>CRM dùng hằng ngày</h1><p class="muted">Đã sửa cột AI, cột Gợi ý và cột Nhật ký.</p><div class="legend"><span class="grade-a">A = đỏ 🔥</span><span class="grade-b">B = vàng 🌤</span><span class="grade-c">C = xanh ❄</span></div><div class="kpis"><div class="kpi"><strong>${c.td}</strong><span>Lead hôm nay</span></div><div class="kpi"><strong>${c.total}</strong><span>Tổng lead</span></div><div class="kpi"><strong>${c.A}</strong><span>Lead A</span></div><div class="kpi"><strong>${c.B}</strong><span>Lead B</span></div><div class="kpi"><strong>${c.C}</strong><span>Lead C</span></div><div class="kpi"><strong>${c.hot}</strong><span>🔥 Nóng</span></div><div class="kpi"><strong>${money(c.rev)}</strong><span>Hoa hồng</span></div></div><div class="toolbar card"><input id="q" placeholder="Tìm lead..." oninput="drawRows()"><select id="g" onchange="drawRows()"><option value="">A/B/C</option><option>A</option><option>B</option><option>C</option></select><select id="tag" onchange="drawRows()"><option value="">Tag</option><option>🔥 Nóng</option><option>🌤 Ấm</option><option>❄ Lạnh</option></select><button onclick="load()">Tải lại</button><button class="secondary" onclick="exportCSV()">Xuất CSV</button></div><div class="table-wrap"><table><thead><tr><th class="col-customer">Khách</th><th class="col-ai">AI</th><th class="col-suggest">Gợi ý</th><th class="col-todo">Việc cần làm</th><th class="col-note">Nhật ký</th><th class="col-call">Gọi</th></tr></thead><tbody id="rows"></tbody></table></div></main>`;drawRows()}
window.drawRows=function(){const q=(document.getElementById('q')?.value||'').toLowerCase(),g=document.getElementById('g')?.value||'',tag=document.getElementById('tag')?.value||'';const rows=LEADS.filter(l=>{const blob=[l.name,l.phone,l.service,l.need,l.productSuggest].join(' ').toLowerCase();return(!q||blob.includes(q))&&(!g||l.aiGrade===g)&&(!tag||l.aiTag===tag)});document.getElementById('rows').innerHTML=rows.map(l=>`<tr class="${rowClass(l)}"><td><div class="name">${esc(l.name||'Chưa tên')}</div><div class="phone">${esc(l.phone)}</div><div class="date">${shortDate(l.createdAt)}</div></td><td><span class="ai-pill ${gradeClass(l)}">${esc(l.aiGrade||'?')} · ${esc(l.aiScore||0)}</span><br><span class="small">${compactTag(l)}</span></td><td><div class="product">${esc(l.productSuggest||suggestProduct(l))}</div><div class="need">${esc(l.need||'')}</div></td><td><div class="todo">${esc(l.nextCall||followup(l.aiGrade).next)}</div><div class="small">${esc(l.followupDay||followup(l.aiGrade).day)}</div><p><button class="secondary" onclick="showTimeline('${esc(l.id)}')">Xem timeline</button></p></td><td class="note-box"><textarea onchange="logCare('${esc(l.id)}',this.value)" placeholder="Ghi chú sau khi gọi...">${esc(l.careNote||'')}</textarea></td><td><a class="btn call-btn" href="tel:${String(l.phone||'').replace(/\D/g,'')||CALL}">Gọi</a></td></tr>`).join('')||'<tr><td colspan="6">Chưa có lead.</td></tr>'}
window.showTimeline=function(id){const l=LEADS.find(x=>String(x.id)===String(id));let html='';try{const arr=JSON.parse(l.timeline||'[]');html=arr.map(x=>`<div class="timeline-item"><b>${esc(x.action||'Timeline')}</b><br><span class="small">${shortDate(x.time)}</span><p>${esc(x.note||'')}</p></div>`).join('')}catch(e){html=`<div class="timeline-item">${esc(l.timeline||'Chưa có timeline')}</div>`}document.getElementById('modalContent').innerHTML=html||'<p>Chưa có timeline.</p>';document.getElementById('modalBg').style.display='flex'}
window.closeTimeline=function(){document.getElementById('modalBg').style.display='none'}
window.logCare=async function(id,note){try{await api('logCare',{id,log:{note}})}catch(e){console.warn(e)}}
window.exportCSV=function(){const h=['ID','Tên','SĐT','AI_SCORE','AI_GRADE','AI_TAG','NEXT_CALL','FOLLOWUP_DAY','PRODUCT_SUGGEST'];const rows=[h,...LEADS.map(l=>[l.id,l.name,l.phone,l.aiScore,l.aiGrade,l.aiTag,l.nextCall,l.followupDay,l.productSuggest])];const csv=rows.map(r=>r.map(v=>`"${String(v??'').replace(/"/g,'""')}"`).join(',')).join('\n');const a=document.createElement('a');a.href=URL.createObjectURL(new Blob(['\ufeff'+csv],{type:'text/csv'}));a.download='V21_2_CRM_Clean_UI_Fix.csv';a.click()}

document.addEventListener('keydown', function(e){
  if(e.key==='Enter' && document.getElementById('u') && document.getElementById('p')){
    window.doLogin();
  }
});
if(sessionStorage.getItem('v21_login')==='1')load();else login();

})();
</script><script src="assets/crm-clean-v21-4-4.js"></script><script src="assets/no-floating-v21-4-7.js"></script><script src="assets/production-v21-5.js"></script>
<script src="assets/crm-income-v21-5-5.js"></script><script src="assets/crm-source-v21-6.js"></script><script src="assets/lead-engine-v21-6-real.js"></script>
<script src="assets/form-submit-v21-5-2.js"></script>
</body></html>
