<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Admin CRM V20.5.1 - AI tư vấn + chăm sóc lead tự động</title>
<style>
*{box-sizing:border-box}body{margin:0;font-family:Arial,sans-serif;background:#f2fbfa;color:#0f172a}a{text-decoration:none;color:inherit}
.header{height:78px;background:white;border-bottom:1px solid #dbe5e7;display:flex;align-items:center;justify-content:space-between;padding:0 7%;position:sticky;top:0;z-index:50}
.logo{width:42px;height:42px;border-radius:14px;background:#0f766e;color:white;display:inline-flex;align-items:center;justify-content:center;font-weight:900}
.brand{display:flex;gap:12px;align-items:center;font-weight:900;font-size:24px}.brand small{display:block;font-size:12px;color:#64748b}
.nav a,.nav button{margin-left:12px;text-decoration:none;color:#0f172a;font-weight:800;background:#e7f7f5;border:0;border-radius:12px;padding:10px 14px;cursor:pointer}
.container{max-width:1320px;margin:auto;padding:34px 24px}.login-page{min-height:calc(100vh - 78px);display:flex;align-items:center;justify-content:center;padding:24px}
.card{background:white;border:1px solid #dbe5e7;border-radius:24px;padding:22px;box-shadow:0 10px 30px rgba(15,23,42,.06)}.login-card{width:100%;max-width:460px}
h1{font-size:40px;margin:12px 0}h2{margin:0 0 12px}label{font-weight:800;display:block;margin-top:14px}input,select,textarea{padding:12px;border:1px solid #dbe5e7;border-radius:12px;margin-top:6px;background:white}
.login-card input,.toolbar input{width:100%}button,.btn{background:#0f766e;color:white;border:0;border-radius:12px;padding:12px 16px;font-weight:900;cursor:pointer;display:inline-block}
.btn.secondary,button.secondary{background:#e7f7f5;color:#0f766e}.btn.orange{background:#ea580c}.btn.dark{background:#0f172a}.btn.gray{background:#e5e7eb;color:#0f172a}
.badge{display:inline-block;background:#d7faea;color:#047857;border:1px solid #8df0bd;border-radius:999px;padding:8px 14px;font-weight:900}
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:16px;margin:22px 0}.kpi{background:white;border:1px solid #dbe5e7;border-radius:20px;padding:18px;text-align:center;cursor:pointer}
.kpi strong{font-size:28px;color:#0f766e;display:block}.kpi span{font-weight:800;color:#64748b}.toolbar{display:grid;grid-template-columns:2fr 1fr 1fr 1fr 1fr auto auto auto;gap:10px;margin:18px 0;align-items:center}
.table-wrap{overflow:auto;background:white;border-radius:20px;border:1px solid #dbe5e7}table{width:100%;border-collapse:collapse}th,td{padding:12px;border-bottom:1px solid #e2e8f0;vertical-align:top;text-align:left}th{background:#f8fafc;position:sticky;top:78px;z-index:5}
td textarea{min-width:190px;min-height:66px}td select,td input{min-width:132px}.notice{background:#fff7ed;border:1px solid #fed7aa;color:#9a3412;padding:12px;border-radius:14px;margin:12px 0}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}.muted{color:#64748b;font-size:13px}
.hot{border-left:6px solid #dc2626}.warm{border-left:6px solid #f59e0b}.cold{border-left:6px solid #2563eb}.overdue{background:#fff1f2}.unhandled{background:#fffbeb}
.red{color:#dc2626;font-weight:900}.green{color:#047857;font-weight:900}.bar{height:12px;background:#e2e8f0;border-radius:999px;overflow:hidden;margin:6px 0}.bar span{display:block;height:100%;background:#0f766e;border-radius:999px}
.chart{height:220px;display:flex;align-items:end;gap:8px;border-left:1px solid #e2e8f0;border-bottom:1px solid #e2e8f0;padding:10px;margin-top:12px}.chart .col{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;gap:6px}.chart .barcol{width:100%;background:#0f766e;border-radius:8px 8px 0 0;min-height:3px}.chart small{font-size:10px;color:#64748b}
@media(max-width:980px){.toolbar{grid-template-columns:1fr}.grid-2,.grid-3{grid-template-columns:1fr}.header{padding:0 16px}h1{font-size:30px}}
</style>
</head>
<body><div id="root"></div>
<script src="assets/config.js"></script>
<script>
(function(){
const CFG=window.VAYNHANH247_CONFIG||{};
const GAS_URL=CFG.GAS_URL||'https://script.google.com/macros/s/AKfycbwzekJhpMXJVSWA1nBSp-OCA_2FGAtY6j57lj724G4YF7SUiYNmd_WI4fpaVm4M220QuA/exec';
const ADMIN_USER=CFG.ADMIN_USER||'thanhbn29';
const ADMIN_PASS=CFG.ADMIN_PASS||'Thanh2509!';
const CALL_PHONE=CFG.CALL_PHONE||'0822397836';
const PIPE=['Mới','Đã gọi','Quan tâm','Hồ sơ','Giải ngân','Hủy'];
const TYPES=['Nóng','Ấm','Lạnh'];
let LEADS=[];let CARE_LOG=[];let COSTS=JSON.parse(localStorage.getItem('v204_costs')||'{}');
const root=document.getElementById('root');
const esc=s=>String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
const money=n=>(Number(n)||0).toLocaleString('vi-VN')+' đ';
const cleanPhone=v=>String(v||'').replace(/\D/g,'');
const fmt=v=>{if(!v)return'';const d=new Date(v);return isNaN(d)?String(v):d.toLocaleString('vi-VN')};
const dateKey=v=>{const d=new Date(v);return isNaN(d)?'Không rõ':d.toISOString().slice(0,10)};
const todayKey=()=>new Date().toISOString().slice(0,10);
function weekStart(d=new Date()){let x=new Date(d);let day=x.getDay()||7;x.setDate(x.getDate()-day+1);x.setHours(0,0,0,0);return x}
function monthStart(d=new Date()){return new Date(d.getFullYear(),d.getMonth(),1)}
function header(){return `<header class="header"><div class="brand"><span class="logo">V</span><span>VayNhanh247<small>CRM V20.5.1 AI tư vấn + chăm sóc lead tự động</small></span></div><div class="nav"><a href="index.html">Trang khách</a><a href="posts/index.html">Blog</a><a href="reports/v20-4-performance-dashboard.html">Báo cáo</a>${sessionStorage.getItem('v247_login')==='1'?'<button onclick="logout()">Đăng xuất</button>':''}</div></header>`}
function renderLogin(){sessionStorage.removeItem('v247_login');root.innerHTML=header()+`<section class="login-page"><div class="card login-card"><span class="badge">Admin V20.5.1</span><h1>Đăng nhập CRM</h1><p>CRM đo lead/ngày, CPL, nguồn traffic, pipeline, hoa hồng và báo cáo tháng.</p><label>Tài khoản</label><input id="u" placeholder="Tài khoản"><label>Mật khẩu</label><input id="p" type="password" placeholder="Mật khẩu"><div style="margin-top:16px"><button onclick="login()">Đăng nhập</button></div></div></section>`}
window.login=function(){const u=document.getElementById('u').value.trim();const p=document.getElementById('p').value;if(u===ADMIN_USER&&p===ADMIN_PASS){sessionStorage.setItem('v247_login','1');loadCRM();}else alert('Sai tài khoản hoặc mật khẩu.');}
window.logout=function(){renderLogin();}
async function api(action,payload={}){const r=await fetch(GAS_URL,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify({action,...payload})});return await r.json();}
async function loadCRM(){root.innerHTML=header()+`<main class="container"><h1>Đang tải CRM V20.5.1...</h1><p>Đang đọc lead thật từ Google Sheet.</p></main>`;try{const res=await api('list');if(!res.ok)throw new Error(res.error||'Apps Script trả lỗi');LEADS=res.data||[];CARE_LOG=JSON.parse(localStorage.getItem('v204_care_log')||'[]');renderCRM();}catch(e){root.innerHTML=header()+`<main class="container"><div class="notice"><b>Không tải được CRM:</b> ${esc(e.message)}<br>Hãy kiểm tra Apps Script hoặc mạng.</div><button onclick="loadCRM()">Thử lại</button></main>`}}
function sourceOf(l){const s=String(l.utm_source||l.sourcePage||l.url||'').toLowerCase();if(s.includes('facebook')||s==='fb')return'Facebook';if(s.includes('google')||s.includes('seo')||s.includes('blog')||s.includes('organic'))return'SEO';if(s.includes('zalo'))return'Zalo';if(!s||s==='không rõ')return'Direct';return'UTM/Khác'}
function isWon(l){return (l.status||'Mới')==='Giải ngân'}
function isProfile(l){return ['Hồ sơ','Giải ngân'].includes(l.status||'Mới')}
function isOverdue(l){if(!l.callbackAt)return false;return new Date(l.callbackAt)<new Date()&&!['Giải ngân','Hủy'].includes(l.status||'Mới')}
function isUnhandled(l){const d=new Date(l.createdAt);return (l.status||'Mới')==='Mới'&&!isNaN(d)&&(Date.now()-d.getTime()>24*3600*1000)}
function realRevenue(l){return Number(l.realRevenue||0)||0}
function expectedRevenue(l){return Number(l.expectedCommission||0)||0}
function dailyCost(date){return Number(COSTS[date]||0)}
function calc(){const now=new Date(), ws=weekStart(now), ms=monthStart(now), td=todayKey();let today=0,week=0,month=0,won=0,profile=0,expected=0,real=0,overdue=0,unhandled=0;const src={},day={},monthMap={};LEADS.forEach(l=>{const d=new Date(l.createdAt);const dk=dateKey(l.createdAt);day[dk]=(day[dk]||0)+1;if(!isNaN(d)){if(d.toISOString().slice(0,10)===td)today++;if(d>=ws)week++;if(d>=ms)month++;const mk=d.toISOString().slice(0,7);monthMap[mk]=(monthMap[mk]||0)+1;}if(isWon(l)){won++;real+=realRevenue(l)||expectedRevenue(l)}if(isProfile(l))profile++;if((l.status||'Mới')!=='Hủy')expected+=expectedRevenue(l);const so=sourceOf(l);src[so]=(src[so]||0)+1;if(isOverdue(l))overdue++;if(isUnhandled(l))unhandled++;});const totalCost=Object.values(COSTS).reduce((a,b)=>a+Number(b||0),0);return {today,week,month,won,profile,expected,real,overdue,unhandled,src,day,monthMap,total:LEADS.length,totalCost,cpl:LEADS.length?Math.round(totalCost/LEADS.length):0,conv:LEADS.length?Math.round(won/LEADS.length*100):0,profileRate:LEADS.length?Math.round(profile/LEADS.length*100):0}}
function rowClass(l){let c=(l.leadType==='Nóng'?'hot':l.leadType==='Lạnh'?'cold':'warm'); if(isOverdue(l))c+=' overdue'; else if(isUnhandled(l))c+=' unhandled'; return c}
function chartHTML(map){const entries=Object.entries(map).sort().slice(-14);const max=Math.max(1,...entries.map(x=>x[1]));return `<div class="chart">${entries.map(([k,v])=>`<div class="col"><div class="barcol" title="${k}: ${v}" style="height:${Math.max(3,Math.round(v/max*190))}px"></div><small>${k.slice(5)}</small></div>`).join('')}</div>`}
function sourceHTML(src,total){return Object.entries(src).map(([k,v])=>`<p><b>${esc(k)}:</b> ${v} lead</p><div class="bar"><span style="width:${total?Math.round(v/total*100):0}%"></span></div>`).join('')||'<p>Chưa có nguồn.</p>'}
function renderCRM(){const c=calc();root.innerHTML=header()+`<main class="container"><span class="badge">V20.5.1 Real CRM Performance</span><h1>AI tư vấn + chăm sóc lead tự động</h1><p>Dashboard lead/ngày, CPL, nguồn traffic, pipeline, hoa hồng, báo cáo tháng và xuất Excel/CSV.</p>
<div class="kpis">
<div class="kpi" onclick="setTimeFilter('today')"><strong>${c.today}</strong><span>Lead hôm nay</span></div>
<div class="kpi" onclick="setTimeFilter('week')"><strong>${c.week}</strong><span>Lead tuần này</span></div>
<div class="kpi" onclick="setTimeFilter('month')"><strong>${c.month}</strong><span>Lead tháng này</span></div>
<div class="kpi"><strong>${c.cpl?money(c.cpl):'0 đ'}</strong><span>CPL</span></div>
<div class="kpi"><strong>${c.profileRate}%</strong><span>Lead → Hồ sơ</span></div>
<div class="kpi"><strong>${c.conv}%</strong><span>Lead → Giải ngân</span></div>
<div class="kpi"><strong>${money(c.real)}</strong><span>Hoa hồng thực nhận</span></div>
<div class="kpi"><strong>${money(c.expected)}</strong><span>Hoa hồng dự kiến</span></div>
<div class="kpi" onclick="setRiskFilter('overdue')"><strong class="red">${c.overdue}</strong><span>Quá hạn gọi lại</span></div>
<div class="kpi" onclick="setRiskFilter('unhandled')"><strong>${c.unhandled}</strong><span>Chưa chăm sóc</span></div>
</div>
<div class="grid-2">
<div class="card"><h2>Biểu đồ lead/ngày</h2>${chartHTML(c.day)}</div>
<div class="card"><h2>Báo cáo nguồn</h2>${sourceHTML(c.src,c.total)}</div>
</div>
<div class="grid-3" style="margin-top:16px">
<div class="card"><h2>Chi phí & CPL</h2><label>Chi phí hôm nay</label><input id="todayCost" type="number" value="${dailyCost(todayKey())}" placeholder="Nhập chi phí hôm nay"><button style="margin-top:10px" onclick="saveTodayCost()">Lưu chi phí</button><p>Tổng chi phí: <b>${money(c.totalCost)}</b></p><p>CPL: <b>${money(c.cpl)}</b></p></div>
<div class="card"><h2>Pipeline</h2>${PIPE.map(st=>`<p><b>${st}:</b> ${LEADS.filter(l=>(l.status||'Mới')===st).length}</p>`).join('')}</div>
<div class="card"><h2>Báo cáo tháng</h2>${Object.entries(c.monthMap).sort().slice(-6).map(([m,v])=>`<p><b>${m}:</b> ${v} lead</p>`).join('')||'<p>Chưa có dữ liệu.</p>'}<button class="secondary" onclick="exportMonthlyReport()">Xuất báo cáo tháng</button></div>
</div>
<div class="toolbar card"><input id="q" placeholder="Tìm tên, SĐT, nhu cầu..." oninput="renderRows()"><select id="st" onchange="renderRows()"><option value="">Tất cả trạng thái</option>${PIPE.map(x=>`<option>${x}</option>`).join('')}</select><select id="src" onchange="renderRows()"><option value="">Tất cả nguồn</option><option>SEO</option><option>Direct</option><option>Facebook</option><option>Zalo</option><option>UTM/Khác</option></select><select id="tp" onchange="renderRows()"><option value="">Tất cả phân loại</option>${TYPES.map(x=>`<option>${x}</option>`).join('')}</select><select id="time" onchange="renderRows()"><option value="">Tất cả thời gian</option><option value="today">Hôm nay</option><option value="week">Tuần này</option><option value="month">Tháng này</option></select><button class="secondary" onclick="exportCSV()">Xuất Excel/CSV</button><button class="secondary" onclick="backupCRM()">Backup JSON</button><button onclick="loadCRM()">Tải lại</button></div>
<div class="table-wrap"><table><thead><tr><th>Khách</th><th>Sản phẩm/Nhu cầu</th><th>Nguồn</th><th>Pipeline</th><th>Phân loại</th><th>Lịch hẹn</th><th>Ghi chú</th><th>Hoa hồng</th><th>Thao tác</th></tr></thead><tbody id="rows"></tbody></table></div>
<section class="card" style="margin-top:20px"><h2>Nhật ký lead theo ngày</h2><div id="dailyLog"></div></section>
<section class="card" style="margin-top:20px"><h2>Nhật ký chăm sóc</h2><div id="careLogBox"></div></section>
</main>`;renderRows();renderDailyLog();renderCareLog();}
window.saveTodayCost=function(){COSTS[todayKey()]=Number(document.getElementById('todayCost').value||0);localStorage.setItem('v204_costs',JSON.stringify(COSTS));renderCRM()}
window.setTimeFilter=t=>{document.getElementById('time').value=t;renderRows()}
window.setRiskFilter=r=>{window.RISK_FILTER=r;renderRows()}
function filtered(){const q=(document.getElementById('q')?.value||'').toLowerCase(),st=document.getElementById('st')?.value||'',src=document.getElementById('src')?.value||'',tp=document.getElementById('tp')?.value||'',time=document.getElementById('time')?.value||'';const now=new Date(),ws=weekStart(now),ms=monthStart(now),td=todayKey();return LEADS.filter(l=>{const blob=[l.name,l.phone,l.email,l.service,l.need,l.careNote,l.utm_source,l.sourcePage].join(' ').toLowerCase();const d=new Date(l.createdAt);let timeOK=true;if(time==='today')timeOK=!isNaN(d)&&d.toISOString().slice(0,10)===td;if(time==='week')timeOK=!isNaN(d)&&d>=ws;if(time==='month')timeOK=!isNaN(d)&&d>=ms;let riskOK=true;if(window.RISK_FILTER==='overdue')riskOK=isOverdue(l);if(window.RISK_FILTER==='unhandled')riskOK=isUnhandled(l);return(!q||blob.includes(q))&&(!st||(l.status||'Mới')===st)&&(!src||sourceOf(l)===src)&&(!tp||(l.leadType||'Ấm')===tp)&&timeOK&&riskOK})}
window.renderRows=function(){const rows=filtered();document.getElementById('rows').innerHTML=rows.map(l=>`<tr class="${rowClass(l)}"><td><b>${esc(l.name)}</b><br>${esc(l.phone)}<br><small>${fmt(l.createdAt)}</small><br>${isOverdue(l)?'<span class="red">Quá hạn gọi lại</span>':''}${isUnhandled(l)?'<span class="red">Chưa chăm sóc >24h</span>':''}</td><td><b>${esc(l.service)}</b><br>${esc(l.need||l.note)}</td><td><b>${sourceOf(l)}</b><br><small>${esc(l.utm_source||l.sourcePage||'Không rõ')}</small></td><td><select onchange="saveLead('${esc(l.id)}','status',this.value,true)">${PIPE.map(st=>`<option ${st===(l.status||'Mới')?'selected':''}>${st}</option>`).join('')}</select></td><td><select onchange="saveLead('${esc(l.id)}','leadType',this.value,true)">${TYPES.map(t=>`<option ${t===(l.leadType||'Ấm')?'selected':''}>${t}</option>`).join('')}</select></td><td><input type="datetime-local" value="${toLocal(l.callbackAt)}" onchange="saveLead('${esc(l.id)}','callbackAt',this.value,true)"></td><td><textarea onchange="saveLead('${esc(l.id)}','careNote',this.value,true)" placeholder="Ghi chú chăm sóc...">${esc(l.careNote||'')}</textarea></td><td><input type="number" value="${Number(l.realRevenue||0)}" placeholder="Thực nhận" onchange="saveLead('${esc(l.id)}','realRevenue',this.value,true)"><small>Dự kiến: ${money(l.expectedCommission)}</small></td><td><a class="btn" href="tel:${cleanPhone(l.phone)||CALL_PHONE}" onclick="autoCalled('${esc(l.id)}')">Gọi</a><br><br><button class="btn gray" onclick="alert('Zalo sắp cập nhật')">Zalo sắp cập nhật</button></td></tr>`).join('')||'<tr><td colspan="9">Chưa có lead phù hợp.</td></tr>';}
function toLocal(v){if(!v)return'';const d=new Date(v);if(isNaN(d))return'';return new Date(d.getTime()-d.getTimezoneOffset()*60000).toISOString().slice(0,16)}
async function saveLead(id,field,value,log){const l=LEADS.find(x=>String(x.id)===String(id));if(l)l[field]=value;if(log)addCareLog(l,field,value);try{await api('update',{id,patch:{[field]:value}})}catch(e){console.warn(e)}renderDailyLog();renderCareLog();}
window.saveLead=saveLead;
window.autoCalled=function(id){const l=LEADS.find(x=>String(x.id)===String(id));if(l&&(l.status||'Mới')==='Mới')saveLead(id,'status','Đã gọi',true)}
function addCareLog(l,field,value){if(!l)return;CARE_LOG.unshift({time:new Date().toISOString(),id:l.id,name:l.name,phone:l.phone,field,value});CARE_LOG=CARE_LOG.slice(0,300);localStorage.setItem('v204_care_log',JSON.stringify(CARE_LOG))}
function renderDailyLog(){const map={};LEADS.forEach(l=>{const k=dateKey(l.createdAt);map[k]=map[k]||[];map[k].push(l)});const el=document.getElementById('dailyLog');if(el)el.innerHTML=Object.entries(map).sort().reverse().slice(0,14).map(([d,list])=>`<p><b>${d}:</b> ${list.length} lead — ${list.map(x=>esc(x.name||x.phone)).slice(0,5).join(', ')}</p>`).join('')||'<p>Chưa có dữ liệu.</p>'}
function renderCareLog(){const el=document.getElementById('careLogBox');if(el)el.innerHTML=CARE_LOG.slice(0,30).map(x=>`<p><b>${fmt(x.time)}</b> — ${esc(x.name)} (${esc(x.phone)}): ${esc(x.field)} → ${esc(x.value)}</p>`).join('')||'<p>Chưa có nhật ký chăm sóc.</p>'}
window.exportCSV=function(){const h=['Mã lead','Thời gian','Họ tên','SĐT','Email','Sản phẩm','Nhu cầu','Nguồn','Trạng thái','Phân loại','Lịch hẹn','Ghi chú','Hoa hồng dự kiến','Hoa hồng thực nhận'];const data=filtered().map(l=>[l.id,fmt(l.createdAt),l.name,l.phone,l.email,l.service,l.need,sourceOf(l),l.status,l.leadType,l.callbackAt,l.careNote,l.expectedCommission,l.realRevenue||0]);download('VayNhanh247_Leads_V20_4.csv',[h,...data].map(r=>r.map(v=>`"${String(v??'').replace(/"/g,'""')}"`).join(',')).join('\n'),'text/csv')}
window.exportMonthlyReport=function(){const c=calc();const rows=[['Chỉ tiêu','Giá trị'],['Tổng lead',c.total],['Lead tháng này',c.month],['Hồ sơ',c.profile],['Giải ngân',c.won],['Tỷ lệ hồ sơ',c.profileRate+'%'],['Tỷ lệ chốt',c.conv+'%'],['Tổng chi phí',c.totalCost],['CPL',c.cpl],['Hoa hồng thực nhận',c.real]];download('VayNhanh247_BaoCaoThang_V20_4.csv',rows.map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n'),'text/csv')}
window.backupCRM=function(){download('VayNhanh247_CRM_Backup_V20_4.json',JSON.stringify({leads:LEADS,costs:COSTS,careLog:CARE_LOG,exportedAt:new Date().toISOString()},null,2),'application/json')}
function download(name,content,type){const a=document.createElement('a');a.href=URL.createObjectURL(new Blob(["\ufeff"+content],{type:type+';charset=utf-8'}));a.download=name;a.click()}
renderLogin();
})();
</script>
<script src="assets/ai-lead-v20-5.js"></script>
<script>
function v205ScoreText(text, phone){
 text=String(text||'').toLowerCase();let score=40;
 if(/gấp|hôm nay|cần vay|muốn vay|giải ngân/.test(text))score+=30;
 if(/cic|nợ xấu|nhóm 2|nhóm 3/.test(text))score+=15;
 if(/lương|thu nhập|sao kê|chuyển khoản/.test(text))score+=10;
 if(String(phone||'').replace(/\D/g,'').length>=9)score+=10;
 if(/tham khảo|tìm hiểu|sau/.test(text))score-=15;
 return Math.max(0,Math.min(100,score));
}
function v205CallScript(service){
 service=String(service||'').toLowerCase();
 if(service.includes('cic')||service.includes('nợ xấu'))return 'Kịch bản CIC: hỏi nhóm nợ, đã tất toán chưa, thu nhập hiện tại và thời điểm cần xử lý.';
 if(service.includes('thẻ'))return 'Kịch bản thẻ: hỏi thu nhập, nhận lương qua đâu, nhu cầu hạn mức và lịch sử tín dụng.';
 if(service.includes('bảo hiểm'))return 'Kịch bản bảo hiểm: hỏi độ tuổi, ngân sách, nhu cầu bảo vệ sức khỏe/nhân thọ.';
 return 'Kịch bản vay: hỏi số tiền cần vay, thu nhập, CIC, thời gian cần giải ngân và hồ sơ đang có.';
}
