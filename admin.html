body{background:#f2fbfa;color:#0f172a}.admin-login-page{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}.login-card{background:white;border-radius:28px;padding:32px;max-width:460px;width:100%;box-shadow:0 20px 60px rgba(15,23,42,.12)}.login-card h1{font-size:34px}.login-card label{font-weight:800;display:block;margin-top:14px}.login-card input{width:100%;padding:14px;border:1px solid #dbe5e7;border-radius:14px;margin-top:6px}.login-card button,.toolbar button,.admin-header button,.btn{background:#0f766e;color:white;border:0;border-radius:14px;padding:12px 16px;font-weight:800;text-decoration:none;display:inline-block;margin-top:10px}.btn.secondary{background:#e7f7f5;color:#0f766e}.hint{color:#64748b;font-size:13px}.brand-row{display:flex;gap:12px;align-items:center}.logo{width:42px;height:42px;border-radius:14px;background:#0f766e;color:white;display:inline-flex;align-items:center;justify-content:center;font-weight:900}.brand-row small{display:block;color:#64748b}.admin-header{height:82px;background:white;border-bottom:1px solid #dbe5e7;display:flex;align-items:center;justify-content:space-between;padding:0 8%;position:sticky;top:0;z-index:5}.admin-header nav{display:flex;gap:14px;align-items:center}.admin-header a{font-weight:800;color:#0f172a;text-decoration:none}.admin-shell{max-width:1180px;margin:0 auto;padding:52px 24px}.admin-shell h1{font-size:44px}.badge{background:#d7faea;color:#047857;border:1px solid #8df0bd;border-radius:999px;padding:8px 14px;font-weight:900}.lead{font-size:18px;color:#475569}.kpi-row,.pipeline-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:16px;margin:22px 0}.kpi,.pipeline-row button,.card{background:white;border:1px solid #dbe5e7;border-radius:22px;padding:20px;box-shadow:0 10px 30px rgba(15,23,42,.04)}.kpi strong,.pipeline-row b{display:block;font-size:28px;color:#0f766e}.kpi span,.pipeline-row span{font-weight:800;color:#64748b}.toolbar{display:flex;gap:12px;flex-wrap:wrap;background:white;border-radius:22px;padding:16px;margin:24px 0}.toolbar input{flex:1;min-width:260px}.toolbar input,.toolbar select,table select,table input,textarea{padding:10px;border:1px solid #dbe5e7;border-radius:12px}.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:18px}.table-wrap{overflow:auto}table{width:100%;border-collapse:collapse}th,td{padding:12px;border-bottom:1px solid #e2e8f0;vertical-align:top}th{text-align:left;background:#f8fafc}textarea{min-width:180px;min-height:64px}.secondary{background:#e7f7f5!important;color:#0f766e!important}@media(max-width:800px){.grid-2{grid-template-columns:1fr}.admin-header{padding:0 16px}.admin-shell h1{font-size:32px}}
