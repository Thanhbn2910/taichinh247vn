<!doctype html><html lang="vi"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Admin CRM V20.6 - AI vận hành thật</title>
<style>
*{box-sizing:border-box}body{margin:0;font-family:Arial,sans-serif;background:#f2fbfa;color:#0f172a}a{text-decoration:none;color:inherit}.header{height:78px;background:white;border-bottom:1px solid #dbe5e7;display:flex;align-items:center;justify-content:space-between;padding:0 7%;position:sticky;top:0;z-index:50}.logo{width:42px;height:42px;border-radius:14px;background:#0f766e;color:white;display:inline-flex;align-items:center;justify-content:center;font-weight:900}.brand{display:flex;gap:12px;align-items:center;font-weight:900;font-size:24px}.brand small{display:block;font-size:12px;color:#64748b}.nav a,.nav button{margin-left:12px;color:#0f172a;font-weight:800;background:#e7f7f5;border:0;border-radius:12px;padding:10px 14px;cursor:pointer}.container{max-width:1360px;margin:auto;padding:34px 24px}.card{background:white;border:1px solid #dbe5e7;border-radius:24px;padding:22px;box-shadow:0 10px 30px rgba(15,23,42,.06)}.login-page{min-height:calc(100vh - 78px);display:flex;align-items:center;justify-content:center;padding:24px}.login-card{width:100%;max-width:460px}h1{font-size:40px;margin:12px 0}label{font-weight:800;display:block;margin-top:14px}input,select,textarea{padding:12px;border:1px solid #dbe5e7;border-radius:12px;margin-top:6px}button,.btn{background:#0f766e;color:white;border:0;border-radius:12px;padding:12px 16px;font-weight:900;cursor:pointer;display:inline-block}.secondary{background:#e7f7f5!important;color:#0f766e!important}.badge{display:inline-block;background:#d7faea;color:#047857;border:1px solid #8df0bd;border-radius:999px;padding:8px 14px;font-weight:900}.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:16px;margin:22px 0}.kpi{background:white;border:1px solid #dbe5e7;border-radius:20px;padding:18px;text-align:center}.kpi strong{font-size:28px;color:#0f766e;display:block}.kpi span{font-weight:800;color:#64748b}.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}.toolbar{display:grid;grid-template-columns:2fr 1fr 1fr 1fr 1fr auto auto;gap:10px;margin:18px 0;align-items:center}.toolbar input{width:100%}.table-wrap{overflow:auto;background:white;border-radius:20px;border:1px solid #dbe5e7}table{width:100%;border-collapse:collapse}th,td{padding:12px;border-bottom:1px solid #e2e8f0;vertical-align:top;text-align:left}th{background:#f8fafc;position:sticky;top:78px;z-index:5}td textarea{min-width:190px;min-height:66px}td select,td input{min-width:132px}.notice{background:#fff7ed;border:1px solid #fed7aa;color:#9a3412;padding:12px;border-radius:14px;margin:12px 0}.red{color:#dc2626;font-weight:900}.green{color:#047857;font-weight:900}.hot{border-left:6px solid #dc2626}.warm{border-left:6px solid #f59e0b}.cold{border-left:6px solid #2563eb}.overdue{background:#fff1f2}.silent{background:#fffbeb}.bar{height:12px;background:#e2e8f0;border-radius:999px;overflow:hidden;margin:6px 0}.bar span{display:block;height:100%;background:#0f766e;border-radius:999px}.chart{height:220px;display:flex;align-items:end;gap:8px;border-left:1px solid #e2e8f0;border-bottom:1px solid #e2e8f0;padding:10px;margin-top:12px}.chart .col{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;gap:6px}.chart .barcol{width:100%;background:#0f766e;border-radius:8px 8px 0 0;min-height:3px}.chart small{font-size:10px;color:#64748b}@media(max-width:980px){.toolbar,.grid-2,.grid-3{grid-template-columns:1fr}.header{padding:0 16px}h1{font-size:30px}}
</style><script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{"@type":"Question","name":"CIC/nợ xấu có được tư vấn không?","acceptedAnswer":{"@type":"Answer","text":"Có, hệ thống hỗ trợ kiểm tra sơ bộ theo nhóm nợ, thời điểm tất toán và thu nhập hiện tại."}},{"@type":"Question","name":"Vay tín chấp cần gì?","acceptedAnswer":{"@type":"Answer","text":"Cần xem thu nhập, lịch sử tín dụng, nhu cầu vay và hồ sơ hiện có."}},{"@type":"Question","name":"Có tư vấn bảo hiểm không?","acceptedAnswer":{"@type":"Answer","text":"Có, tư vấn theo nhu cầu bảo vệ, ngân sách và độ tuổi."}}]}</script></head><body><div id="root"></div><script src="assets/config.js"></script><script>
(function(){
const CFG=window.VAYNHANH247_CONFIG||{};const GAS_URL=CFG.GAS_URL||'https://script.google.com/macros/s/AKfycbwzekJhpMXJVSWA1nBSp-OCA_2FGAtY6j57lj724G4YF7SUiYNmd_WI4fpaVm4M220QuA/exec';const ADMIN_USER=CFG.ADMIN_USER||'thanhbn29';const ADMIN_PASS=CFG.ADMIN_PASS||'Thanh2509!';const CALL_PHONE=CFG.CALL_PHONE||'0822397836';
const PIPE=['Lead mới','Đã gọi','Hồ sơ','Thẩm định','Giải ngân','Hoàn thành','Hoa hồng','Hủy'];const TEMPS=['Nóng','Ấm','Lạnh'];let LEADS=[];let LOGS=JSON.parse(localStorage.getItem('v206_logs')||'[]');let COSTS=JSON.parse(localStorage.getItem('v206_costs')||'{}');const root=document.getElementById('root');
const esc=s=>String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));const money=n=>(Number(n)||0).toLocaleString('vi-VN')+' đ';const clean=v=>String(v||'').replace(/\D/g,'');const fmt=v=>{if(!v)return'';const d=new Date(v);return isNaN(d)?String(v):d.toLocaleString('vi-VN')};const today=()=>new Date().toISOString().slice(0,10);const dateKey=v=>{const d=new Date(v);return isNaN(d)?'Không rõ':d.toISOString().slice(0,10)};function weekStart(d=new Date()){let x=new Date(d);let day=x.getDay()||7;x.setDate(x.getDate()-day+1);x.setHours(0,0,0,0);return x}function monthStart(d=new Date()){return new Date(d.getFullYear(),d.getMonth(),1)}
function header(){return `<header class="header"><div class="brand"><span class="logo">V</span><span>VayNhanh247<small>CRM V20.6 AI vận hành thật</small></span></div><div class="nav"><a href="index.html">Trang khách</a><a href="posts/index.html">Blog</a><a href="reports/v20-6-ai-operations-dashboard.html">Báo cáo</a>${sessionStorage.getItem('v247_login')==='1'?'<button onclick="logout()">Đăng xuất</button>':''}</div></header>`}
function loginPage(){root.innerHTML=header()+`<section class="login-page"><div class="card login-card"><span class="badge">Admin V20.6</span><h1>Đăng nhập CRM</h1><p>AI Lead Scoring, timeline, nhật ký gọi, pipeline thật và đo hiệu quả.</p><label>Tài khoản</label><input id="u"><label>Mật khẩu</label><input id="p" type="password"><div style="margin-top:16px"><button onclick="login()">Đăng nhập</button></div></div></section>`}
window.login=function(){if(document.getElementById('u').value.trim()===ADMIN_USER&&document.getElementById('p').value===ADMIN_PASS){sessionStorage.setItem('v247_login','1');loadCRM()}else alert('Sai tài khoản hoặc mật khẩu')};window.logout=function(){sessionStorage.removeItem('v247_login');loginPage()};
async function api(action,payload={}){const r=await fetch(GAS_URL,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify({action,...payload})});return await r.json()}
async function loadCRM(){root.innerHTML=header()+`<main class="container"><h1>Đang tải CRM V20.6...</h1></main>`;try{const res=await api('list');if(!res.ok)throw new Error(res.error||'Apps Script trả lỗi');LEADS=(res.data||[]).map(normalize);renderCRM()}catch(e){root.innerHTML=header()+`<main class="container"><div class="notice"><b>Không tải được CRM:</b> ${esc(e.message)}</div><button onclick="loadCRM()">Thử lại</button></main>`}}
function normalize(l){if(l.status==='Mới')l.status='Lead mới';return l}
function sourceOf(l){const s=String(l.utm_source||l.sourcePage||l.url||'').toLowerCase();if(s.includes('facebook')||s==='fb')return'Facebook';if(s.includes('google')||s.includes('seo')||s.includes('blog')||s.includes('organic'))return'SEO';if(s.includes('zalo'))return'Zalo';if(s.includes('ai'))return'AI Chat';if(!s||s==='không rõ')return'Direct';return'UTM/Khác'}
function score(l){const text=[l.need,l.service,l.income,l.note,l.careNote,sourceOf(l)].join(' ').toLowerCase();let sc=35;const inc=Number(String(l.income||'').replace(/\D/g,''))||0;if(inc>=20000000)sc+=25;else if(inc>=10000000)sc+=18;else if(inc>=5000000)sc+=10;if(/gấp|hôm nay|cần vay|muốn vay|giải ngân|làm hồ sơ/.test(text))sc+=25;if(/cic|nợ xấu|nhóm 2|nhóm 3/.test(text))sc+=10;if(/vay tín chấp|thẻ tín dụng|bảo hiểm|cic/.test(text))sc+=8;if(/facebook|ads|utm/.test(text))sc+=8;if(/seo|google|blog|organic/.test(text))sc+=6;if(clean(l.phone).length>=9)sc+=10;if(/tham khảo|tìm hiểu|sau|chưa cần/.test(text))sc-=18;sc=Math.max(0,Math.min(100,sc));return {score:sc,grade:sc>=75?'A':sc>=50?'B':'C',temp:sc>=75?'Nóng':sc>=50?'Ấm':'Lạnh'}}
function isWon(l){return ['Giải ngân','Hoàn thành','Hoa hồng'].includes(l.status||'Lead mới')}function isOverdue(l){if(!l.callbackAt)return false;return new Date(l.callbackAt)<new Date()&&!['Giải ngân','Hoàn thành','Hoa hồng','Hủy'].includes(l.status||'Lead mới')}function isSilent(l){const d=new Date(l.lastCareAt||l.updatedAt||l.createdAt);return !isNaN(d)&&(Date.now()-d.getTime()>3*24*3600*1000)&&!['Hoàn thành','Hoa hồng','Hủy'].includes(l.status||'Lead mới')}function expected(l){return Number(l.expectedCommission||0)||0}function real(l){return Number(l.realRevenue||0)||0}function dailyCost(d){return Number(COSTS[d]||0)}
function callScript(l){const s=String(l.service||'').toLowerCase();if(s.includes('cic')||s.includes('nợ xấu'))return 'Hỏi nhóm nợ, đã tất toán chưa, thu nhập hiện tại, cần vay hay cần xử lý CIC.';if(s.includes('thẻ'))return 'Hỏi thu nhập, nhận lương qua đâu, hạn mức mong muốn, lịch sử tín dụng.';if(s.includes('bảo hiểm'))return 'Hỏi độ tuổi, ngân sách, mục tiêu bảo vệ sức khỏe/nhân thọ/tai nạn.';return 'Hỏi số tiền cần vay, thu nhập, CIC, hồ sơ đang có và thời gian cần giải ngân.'}
function calc(){const now=new Date(),ws=weekStart(now),ms=monthStart(now),td=today();let todayN=0,week=0,month=0,won=0,profile=0,exp=0,rr=0,over=0,silent=0;let src={},day={},steps={};PIPE.forEach(p=>steps[p]=0);LEADS.forEach(l=>{const d=new Date(l.createdAt);if(!isNaN(d)){const dk=d.toISOString().slice(0,10);day[dk]=(day[dk]||0)+1;if(dk===td)todayN++;if(d>=ws)week++;if(d>=ms)month++;}steps[l.status||'Lead mới']=(steps[l.status||'Lead mới']||0)+1;if(['Hồ sơ','Thẩm định','Giải ngân','Hoàn thành','Hoa hồng'].includes(l.status||''))profile++;if(isWon(l))won++;exp+=expected(l);rr+=real(l)||expected(l);if(isOverdue(l))over++;if(isSilent(l))silent++;const so=sourceOf(l);src[so]=(src[so]||0)+1});const totalCost=Object.values(COSTS).reduce((a,b)=>a+Number(b||0),0);return {total:LEADS.length,todayN,week,month,won,profile,exp,rr,over,silent,src,day,steps,totalCost,cpl:LEADS.length?Math.round(totalCost/LEADS.length):0,conv:LEADS.length?Math.round(won/LEADS.length*100):0,profileRate:LEADS.length?Math.round(profile/LEADS.length*100):0}}
function chart(map){const arr=Object.entries(map).sort().slice(-14);const max=Math.max(1,...arr.map(x=>x[1]));return `<div class="chart">${arr.map(([k,v])=>`<div class="col"><div class="barcol" style="height:${Math.max(3,Math.round(v/max*190))}px"></div><small>${k.slice(5)}</small></div>`).join('')}</div>`}
function bars(map,total){return Object.entries(map).map(([k,v])=>`<p><b>${esc(k)}:</b> ${v}</p><div class="bar"><span style="width:${total?Math.round(v/total*100):0}%"></span></div>`).join('')||'<p>Chưa có dữ liệu.</p>'}
function renderCRM(){const c=calc();root.innerHTML=header()+`<main class="container"><span class="badge">V20.6 AI Real Operations</span><h1>AI vận hành thật</h1><p>AI scoring A/B/C, chăm sóc tự động, timeline, pipeline thật, CPL, top nguồn lead và hoa hồng tháng.</p><div class="kpis"><div class="kpi"><strong>${c.todayN}</strong><span>Lead hôm nay</span></div><div class="kpi"><strong>${c.week}</strong><span>Lead tuần</span></div><div class="kpi"><strong>${c.month}</strong><span>Lead tháng</span></div><div class="kpi"><strong>${money(c.cpl)}</strong><span>CPL thật</span></div><div class="kpi"><strong>${c.profileRate}%</strong><span>Lead → Hồ sơ</span></div><div class="kpi"><strong>${c.conv}%</strong><span>Lead → Giải ngân</span></div><div class="kpi"><strong>${money(c.exp)}</strong><span>Doanh thu dự kiến</span></div><div class="kpi"><strong>${money(c.rr)}</strong><span>Hoa hồng tháng</span></div><div class="kpi"><strong class="red">${c.over}</strong><span>Quá hạn</span></div><div class="kpi"><strong class="red">${c.silent}</strong><span>Im lặng >3 ngày</span></div></div><div class="grid-3"><div class="card"><h2>Top nguồn lead</h2>${bars(c.src,c.total)}</div><div class="card"><h2>Tỷ lệ chuyển từng bước</h2>${bars(c.steps,c.total)}</div><div class="card"><h2>Chi phí & CPL</h2><label>Chi phí hôm nay</label><input id="todayCost" type="number" value="${dailyCost(today())}"><button onclick="saveCost()">Lưu chi phí</button><p>Tổng: <b>${money(c.totalCost)}</b></p></div></div><div class="grid-2" style="margin-top:16px"><div class="card"><h2>Biểu đồ lead/ngày</h2>${chart(c.day)}</div><div class="card"><h2>Việc cần làm hôm nay</h2><div id="tasks"></div></div></div><div class="toolbar card"><input id="q" placeholder="Tìm khách..." oninput="renderRows()"><select id="st" onchange="renderRows()"><option value="">Tất cả trạng thái</option>${PIPE.map(x=>`<option>${x}</option>`).join('')}</select><select id="src" onchange="renderRows()"><option value="">Tất cả nguồn</option><option>SEO</option><option>Direct</option><option>Facebook</option><option>AI Chat</option><option>UTM/Khác</option></select><select id="grade" onchange="renderRows()"><option value="">Điểm A/B/C</option><option>A</option><option>B</option><option>C</option></select><select id="temp" onchange="renderRows()"><option value="">Tag nóng/ấm/lạnh</option><option>Nóng</option><option>Ấm</option><option>Lạnh</option></select><button class="secondary" onclick="exportCSV()">Xuất Excel</button><button class="secondary" onclick="exportScripts()">Xuất script gọi</button></div><div class="table-wrap"><table><thead><tr><th>Khách</th><th>AI Score</th><th>Nguồn</th><th>Pipeline</th><th>Timeline</th><th>Nhật ký gọi</th><th>Kịch bản</th><th>Hoa hồng</th><th>Thao tác</th></tr></thead><tbody id="rows"></tbody></table></div></main>`;renderRows();renderTasks()}
window.saveCost=function(){COSTS[today()]=Number(document.getElementById('todayCost').value||0);localStorage.setItem('v206_costs',JSON.stringify(COSTS));renderCRM()}
function filtered(){const q=(document.getElementById('q')?.value||'').toLowerCase(),st=document.getElementById('st')?.value||'',so=document.getElementById('src')?.value||'',gr=document.getElementById('grade')?.value||'',te=document.getElementById('temp')?.value||'';return LEADS.filter(l=>{const s=score(l);const blob=[l.name,l.phone,l.email,l.service,l.need,l.note,l.careNote].join(' ').toLowerCase();return(!q||blob.includes(q))&&(!st||(l.status||'Lead mới')===st)&&(!so||sourceOf(l)===so)&&(!gr||s.grade===gr)&&(!te||s.temp===te)})}
function rowClass(l){const s=score(l);let c=s.temp==='Nóng'?'hot':s.temp==='Ấm'?'warm':'cold';if(isOverdue(l))c+=' overdue';else if(isSilent(l))c+=' silent';return c}
window.renderRows=function(){document.getElementById('rows').innerHTML=filtered().map(l=>{const s=score(l);return `<tr class="${rowClass(l)}"><td><b>${esc(l.name||'Chưa tên')}</b><br>${esc(l.phone)}<br><small>${fmt(l.createdAt)}</small>${isOverdue(l)?'<br><span class="red">Quá hạn</span>':''}${isSilent(l)?'<br><span class="red">Im lặng >3 ngày</span>':''}</td><td><b>${s.grade}</b> - ${s.score}/100<br><span>${s.temp}</span></td><td><b>${sourceOf(l)}</b><br>${esc(l.service)}</td><td><select onchange="saveLead('${esc(l.id)}','status',this.value)">${PIPE.map(x=>`<option ${x===(l.status||'Lead mới')?'selected':''}>${x}</option>`).join('')}</select></td><td><small>${timeline(l)}</small></td><td><textarea onchange="saveLead('${esc(l.id)}','careNote',this.value)" placeholder="Nhật ký gọi...">${esc(l.careNote||'')}</textarea></td><td>${esc(callScript(l))}</td><td><input type="number" value="${Number(l.realRevenue||0)}" onchange="saveLead('${esc(l.id)}','realRevenue',this.value)"><small>Dự kiến: ${money(expected(l))}</small></td><td><a class="btn" href="tel:${clean(l.phone)||CALL_PHONE}" onclick="saveLead('${esc(l.id)}','status','Đã gọi')">Gọi</a></td></tr>`}).join('')||'<tr><td colspan="9">Chưa có lead.</td></tr>'}
function timeline(l){return ['Tạo: '+fmt(l.createdAt),'Trạng thái: '+(l.status||'Lead mới'),'Hẹn: '+fmt(l.callbackAt),'Nguồn: '+sourceOf(l)].filter(x=>!x.endsWith(': ')).join(' → ')}
window.saveLead=async function(id,field,value){const l=LEADS.find(x=>String(x.id)===String(id));if(l){l[field]=value;l.updatedAt=new Date().toISOString();LOGS.unshift({time:new Date().toISOString(),id,name:l.name,phone:l.phone,field,value});localStorage.setItem('v206_logs',JSON.stringify(LOGS.slice(0,500)))}try{await api('update',{id,patch:{[field]:value,updatedAt:new Date().toISOString()}})}catch(e){console.warn(e)}renderCRM()}
function renderTasks(){const box=document.getElementById('tasks');if(!box)return;const arr=LEADS.filter(l=>(l.status||'Lead mới')==='Lead mới'||isOverdue(l)||isSilent(l)||score(l).grade==='A').slice(0,12);box.innerHTML=arr.map(l=>`<p>⚠️ <b>${esc(l.name||l.phone)}</b> — ${score(l).grade}/${score(l).score} — ${isOverdue(l)?'Quá hạn':isSilent(l)?'Im lặng >3 ngày':'Cần gọi'}</p>`).join('')||'<p>Không có việc gấp.</p>'}
window.exportCSV=function(){const h=['Mã','Tên','SĐT','Sản phẩm','Nguồn','AI Grade','AI Score','Tag','Trạng thái','Doanh thu dự kiến','Hoa hồng thực nhận','Ghi chú'];const data=filtered().map(l=>[l.id,l.name,l.phone,l.service,sourceOf(l),score(l).grade,score(l).score,score(l).temp,l.status,expected(l),real(l),l.careNote]);download('VayNhanh247_V20_6_Leads.csv',[h,...data])}
window.exportScripts=function(){const h=['Tên','SĐT','Sản phẩm','AI Grade','Kịch bản'];const data=filtered().map(l=>[l.name,l.phone,l.service,score(l).grade,callScript(l)]);download('VayNhanh247_V20_6_KichBanGoi.csv',[h,...data])}
function download(name,rows){const csv=rows.map(r=>r.map(v=>`"${String(v??'').replace(/"/g,'""')}"`).join(',')).join('\n');const a=document.createElement('a');a.href=URL.createObjectURL(new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8'}));a.download=name;a.click()}
loginPage();
})();
</script></body></html>
