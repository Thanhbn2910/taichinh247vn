<!doctype html><html lang="vi"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Admin CRM V21 - Realtime AI CRM</title>
<style>
*{box-sizing:border-box}body{margin:0;font-family:Arial,sans-serif;background:#f2fbfa;color:#0f172a}a{text-decoration:none;color:inherit}.header{height:78px;background:white;border-bottom:1px solid #dbe5e7;display:flex;align-items:center;justify-content:space-between;padding:0 7%;position:sticky;top:0;z-index:50}.logo{width:42px;height:42px;border-radius:14px;background:#0f766e;color:white;display:inline-flex;align-items:center;justify-content:center;font-weight:900}.brand{display:flex;gap:12px;align-items:center;font-weight:900;font-size:24px}.brand small{display:block;font-size:12px;color:#64748b}.nav a,.nav button{margin-left:12px;color:#0f172a;font-weight:800;background:#e7f7f5;border:0;border-radius:12px;padding:10px 14px;cursor:pointer}.container{max-width:1380px;margin:auto;padding:34px 24px}.card{background:white;border:1px solid #dbe5e7;border-radius:24px;padding:22px;box-shadow:0 10px 30px rgba(15,23,42,.06)}h1{font-size:40px;margin:12px 0}input,select,textarea{padding:12px;border:1px solid #dbe5e7;border-radius:12px;margin-top:6px}button,.btn{background:#0f766e;color:white;border:0;border-radius:12px;padding:12px 16px;font-weight:900;cursor:pointer}.secondary{background:#e7f7f5!important;color:#0f766e!important}.badge{display:inline-block;background:#d7faea;color:#047857;border:1px solid #8df0bd;border-radius:999px;padding:8px 14px;font-weight:900}.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:16px;margin:22px 0}.kpi{background:white;border:1px solid #dbe5e7;border-radius:20px;padding:18px;text-align:center}.kpi strong{font-size:28px;color:#0f766e;display:block}.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}.toolbar{display:grid;grid-template-columns:2fr 1fr 1fr 1fr auto auto;gap:10px;margin:18px 0}.table-wrap{overflow:auto;background:white;border-radius:20px;border:1px solid #dbe5e7}table{width:100%;border-collapse:collapse}th,td{padding:12px;border-bottom:1px solid #e2e8f0;vertical-align:top;text-align:left}th{background:#f8fafc}td textarea{min-width:220px;min-height:70px}.red{color:#dc2626;font-weight:900}.hot{border-left:6px solid #dc2626}.warm{border-left:6px solid #f59e0b}.cold{border-left:6px solid #2563eb}@media(max-width:900px){.grid-3,.toolbar{grid-template-columns:1fr}}
</style></head><body><div id="root"></div><script src="assets/config.js"></script><script src="assets/v21-realtime-ai-crm.js"></script><script>
(function(){
const CFG=window.VAYNHANH247_CONFIG||{}, GAS_URL=CFG.GAS_URL, USER=CFG.ADMIN_USER, PASS=CFG.ADMIN_PASS, CALL=CFG.CALL_PHONE;
let LEADS=[]; const root=document.getElementById('root');
const esc=s=>String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
const money=n=>(Number(n)||0).toLocaleString('vi-VN')+' đ';
function header(){return `<header class="header"><div class="brand"><span class="logo">V</span><span>VayNhanh247<small>CRM V21 Realtime AI CRM</small></span></div><div class="nav"><a href="index.html">Trang khách</a><a href="posts/index.html">Blog</a><button onclick="logout()">Đăng xuất</button></div></header>`}
function login(){root.innerHTML=header()+`<main class="container"><div class="card" style="max-width:460px;margin:auto"><span class="badge">Admin V21</span><h1>Đăng nhập</h1><input id="u" placeholder="Tài khoản"><input id="p" type="password" placeholder="Mật khẩu"><p><button onclick="doLogin()">Đăng nhập</button></p></div></main>`}
window.doLogin=function(){if(document.getElementById('u').value===USER&&document.getElementById('p').value===PASS){sessionStorage.setItem('v21_login','1');load()}else alert('Sai tài khoản/mật khẩu')};window.logout=function(){sessionStorage.removeItem('v21_login');login()};
async function api(action,payload={}){const r=await fetch(GAS_URL,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify({action,...payload})});return await r.json()}
async function load(){root.innerHTML=header()+`<main class="container"><h1>Đang tải CRM V21...</h1></main>`;try{const res=await api('list');if(!res.ok)throw new Error(res.error||'Lỗi Apps Script');LEADS=res.data||[];render()}catch(e){root.innerHTML=header()+`<main class="container"><div class="card"><h2>Không tải được CRM</h2><p class="red">${esc(e.message)}</p><p>Cần cập nhật google-apps-script/Code.gs bản V21 và Deploy Apps Script mới.</p><button onclick="load()">Thử lại</button></div></main>`}}
function calc(){let today=new Date().toISOString().slice(0,10),td=0,A=0,B=0,C=0,hot=0,rev=0;LEADS.forEach(l=>{if(String(l.createdAt||'').slice(0,10)===today)td++; if(l.aiGrade==='A')A++; if(l.aiGrade==='B')B++; if(l.aiGrade==='C')C++; if(String(l.aiTag||'').includes('Nóng'))hot++; rev+=Number(l.realRevenue||l.expectedCommission||0)});return {td,A,B,C,hot,rev,total:LEADS.length}}
function rowClass(l){return String(l.aiTag||'').includes('Nóng')?'hot':String(l.aiTag||'').includes('Ấm')?'warm':'cold'}
function render(){const c=calc();root.innerHTML=header()+`<main class="container"><span class="badge">V21 Full Realtime</span><h1>Mini SaaS tài chính cá nhân</h1><p>Web → GAS → Sheet → CRM → AI realtime.</p><div class="kpis"><div class="kpi"><strong>${c.td}</strong><span>Lead hôm nay</span></div><div class="kpi"><strong>${c.total}</strong><span>Tổng lead</span></div><div class="kpi"><strong>${c.A}</strong><span>Lead A</span></div><div class="kpi"><strong>${c.B}</strong><span>Lead B</span></div><div class="kpi"><strong>${c.C}</strong><span>Lead C</span></div><div class="kpi"><strong>${c.hot}</strong><span>🔥 Nóng</span></div><div class="kpi"><strong>${money(c.rev)}</strong><span>Hoa hồng</span></div></div><div class="grid-3"><div class="card"><h2>AI realtime fields</h2><p>AI_SCORE / AI_TAG / NEXT_CALL / FOLLOWUP_DAY / PRODUCT_SUGGEST / TIMELINE</p></div><div class="card"><h2>Timeline tự động</h2><p>D0 Lead mới → D1 Gọi → D3 Nhắc → D7 Cảnh báo</p></div><div class="card"><h2>Knowledge AI</h2><p>CIC, nợ xấu, BHNT, vay tín chấp.</p></div></div><div class="toolbar card"><input id="q" placeholder="Tìm lead..." oninput="drawRows()"><select id="g" onchange="drawRows()"><option value="">A/B/C</option><option>A</option><option>B</option><option>C</option></select><select id="tag" onchange="drawRows()"><option value="">Tag</option><option>🔥 Nóng</option><option>🌤 Ấm</option><option>❄ Lạnh</option></select><button onclick="load()">Tải lại</button><button class="secondary" onclick="exportCSV()">Xuất CSV</button></div><div class="table-wrap"><table><thead><tr><th>Khách</th><th>AI</th><th>Gợi ý</th><th>Lịch</th><th>Timeline</th><th>Nhật ký</th><th>Gọi</th></tr></thead><tbody id="rows"></tbody></table></div></main>`;drawRows()}
window.drawRows=function(){const q=(document.getElementById('q')?.value||'').toLowerCase(),g=document.getElementById('g')?.value||'',tag=document.getElementById('tag')?.value||'';const rows=LEADS.filter(l=>{const blob=[l.name,l.phone,l.service,l.need,l.productSuggest].join(' ').toLowerCase();return(!q||blob.includes(q))&&(!g||l.aiGrade===g)&&(!tag||l.aiTag===tag)});document.getElementById('rows').innerHTML=rows.map(l=>`<tr class="${rowClass(l)}"><td><b>${esc(l.name||'Chưa tên')}</b><br>${esc(l.phone)}<br><small>${esc(l.createdAt)}</small></td><td><b>${esc(l.aiGrade)} / ${esc(l.aiScore)}</b><br>${esc(l.aiTag)}</td><td>${esc(l.productSuggest)}</td><td><b>${esc(l.nextCall)}</b><br>${esc(l.followupDay)}</td><td><small>${esc(l.timeline)}</small></td><td><textarea onchange="logCare('${esc(l.id)}',this.value)">${esc(l.careNote||'')}</textarea></td><td><a class="btn" href="tel:${String(l.phone||'').replace(/\D/g,'')||CALL}">Gọi</a></td></tr>`).join('')||'<tr><td colspan="7">Chưa có lead.</td></tr>'}
window.logCare=async function(id,note){try{await api('logCare',{id,log:{note}})}catch(e){console.warn(e)}}
window.exportCSV=function(){const h=['ID','Tên','SĐT','AI_SCORE','AI_GRADE','AI_TAG','NEXT_CALL','FOLLOWUP_DAY','PRODUCT_SUGGEST','TIMELINE'];const rows=[h,...LEADS.map(l=>[l.id,l.name,l.phone,l.aiScore,l.aiGrade,l.aiTag,l.nextCall,l.followupDay,l.productSuggest,l.timeline])];const csv=rows.map(r=>r.map(v=>`"${String(v??'').replace(/"/g,'""')}"`).join(',')).join('\n');const a=document.createElement('a');a.href=URL.createObjectURL(new Blob(['\ufeff'+csv],{type:'text/csv'}));a.download='V21_Realtime_AI_CRM.csv';a.click()}
if(sessionStorage.getItem('v21_login')==='1')load();else login();
})();
</script></body></html>
